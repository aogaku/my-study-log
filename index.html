<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学習ログ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-panel" aria-labelledby="app-title">
        <div class="brand-row">
          <div>
            <p class="eyebrow">localStorage study log</p>
            <h1 id="app-title">学習ログ</h1>
            <p class="section-note">今日取り組んだことを、短く残せる学習記録です。</p>
          </div>
          <div class="save-state" id="save-state" aria-live="polite">未保存</div>
        </div>

        <form id="diary-form" class="diary-form">
          <label class="field-label" for="entry-date">日付</label>
          <input id="entry-date" name="date" type="date" required />

          <fieldset class="mood-field">
            <legend>今日の調子</legend>
            <div class="mood-grid" id="mood-grid">
              <label class="mood-option">
                <input type="radio" name="mood" value="happy" required />
                <span class="mood-face">🎯</span>
                <span>とても集中</span>
              </label>
              <label class="mood-option">
                <input type="radio" name="mood" value="calm" />
                <span class="mood-face">📘</span>
                <span>順調</span>
              </label>
              <label class="mood-option">
                <input type="radio" name="mood" value="normal" />
                <span class="mood-face">🙂</span>
                <span>ふつう</span>
              </label>
              <label class="mood-option">
                <input type="radio" name="mood" value="tired" />
                <span class="mood-face">☕</span>
                <span>少し疲れた</span>
              </label>
              <label class="mood-option">
                <input type="radio" name="mood" value="sad" />
                <span class="mood-face">🌙</span>
                <span>切り替えたい</span>
              </label>
            </div>
          </fieldset>

          <label class="field-label" for="entry-note">今日の学習メモ</label>
          <p class="field-hint">例: 数学の問題を3問、英単語を20語、読書メモを2行。</p>
          <textarea
            id="entry-note"
            name="note"
            rows="4"
            maxlength="160"
            placeholder="例: 数学の復習を30分。英単語を20語確認した。"
            required
          ></textarea>
          <div class="note-meta">
            <span id="editing-label">今日の学習を入力しています</span>
            <span><span id="char-count">0</span>/160</span>
          </div>

          <div class="action-row">
            <button class="primary-button" type="submit">記録を保存</button>
            <button class="ghost-button" type="button" id="clear-button">入力をリセット</button>
          </div>
        </form>
      </section>

      <section class="history-panel" aria-labelledby="history-title">
        <div class="history-header">
          <div>
            <p class="eyebrow">study archive</p>
            <h2 id="history-title">最近の学習記録</h2>
            <p class="section-note">あとから見返しやすいように、新しい順で並びます。</p>
          </div>
          <div class="stats-strip" aria-label="記録数">
            <strong id="entry-count">0</strong>
            <span>件</span>
          </div>
        </div>

        <section class="biorhythm" aria-labelledby="biorhythm-title">
          <div>
            <p class="biorhythm-label" id="biorhythm-title">集中度の推移</p>
            <strong id="biorhythm-message">記録を保存すると表示されます</strong>
          </div>
          <div class="rhythm-chart" id="rhythm-chart" aria-label="最近7件の集中度の流れ"></div>
          <p id="biorhythm-detail" class="biorhythm-detail">最近7件の集中度の変化を表示します。</p>
        </section>

        <div class="summary-row" id="summary-row" aria-label="調子の集計"></div>

        <div class="list-tools">
          <label class="search-box" for="search-input">
            <span>検索</span>
            <input id="search-input" type="search" placeholder="学習メモから探す" />
          </label>
          <select id="mood-filter" aria-label="調子で絞り込み">
            <option value="all">すべての調子</option>
            <option value="happy">とても集中</option>
            <option value="calm">順調</option>
            <option value="normal">ふつう</option>
            <option value="tired">少し疲れた</option>
            <option value="sad">切り替えたい</option>
          </select>
        </div>

        <div id="empty-state" class="empty-state">
          <strong>まだ学習記録がありません</strong>
          <span>今日の勉強内容を保存すると、ここに表示されます。</span>
        </div>

        <ul id="entry-list" class="entry-list" aria-label="保存した学習記録一覧"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
